name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci
        working-directory: packages/augment-adk

      - name: Type check
        run: npm run typecheck
        working-directory: packages/augment-adk

      - name: Lint
        run: npm run lint
        working-directory: packages/augment-adk

      - name: Build
        run: npm run build
        working-directory: packages/augment-adk

      - name: Test
        run: npm test
        working-directory: packages/augment-adk
