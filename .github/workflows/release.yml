name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci
        working-directory: packages/augment-adk

      - name: Build
        run: npm run build
        working-directory: packages/augment-adk

      - name: Type check
        run: npm run typecheck
        working-directory: packages/augment-adk

      - name: Test
        run: npm test
        working-directory: packages/augment-adk

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/augment-adk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
